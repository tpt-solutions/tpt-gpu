<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TPT Playground — TPT Script Compiler</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0f1117;
  --bg2:       #161b22;
  --bg3:       #1c2128;
  --border:    #30363d;
  --text:      #c9d1d9;
  --text-dim:  #8b949e;
  --accent:    #58a6ff;
  --green:     #3fb950;
  --red:       #f85149;
  --yellow:    #e3b341;
  --purple:    #bc8cff;
  --orange:    #ffa657;
  --teal:      #39d353;
  --tab-h:     36px;
  --bar-h:     32px;
  --hdr-h:     48px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 14px;
  overflow: hidden;
}

/* ── Header ──────────────────────────────────────────────── */
header {
  height: var(--hdr-h);
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
}

.logo {
  font-weight: 700;
  font-size: 15px;
  color: var(--accent);
  letter-spacing: 0.03em;
  white-space: nowrap;
}
.logo span { color: var(--text-dim); font-weight: 400; font-size: 12px; margin-left: 6px; }

header .spacer { flex: 1; }

select#example-picker {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  outline: none;
}
select#example-picker:hover { border-color: var(--accent); }

button#run-btn {
  background: var(--accent);
  color: var(--bg);
  border: none;
  padding: 5px 14px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
}
button#run-btn:hover { filter: brightness(1.1); }
button#run-btn:active { filter: brightness(0.9); }

/* ── Main layout ─────────────────────────────────────────── */
.layout {
  display: flex;
  height: calc(100vh - var(--hdr-h) - var(--bar-h));
}

/* ── Editor pane ─────────────────────────────────────────── */
.editor-pane {
  width: 50%;
  min-width: 240px;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  position: relative;
}

.pane-label {
  height: var(--tab-h);
  padding: 0 14px;
  display: flex;
  align-items: center;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-dim);
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.editor-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}

/* Line numbers + textarea side-by-side */
.editor-inner {
  display: flex;
  height: 100%;
  overflow: auto;
}

.line-numbers {
  padding: 12px 6px 12px 12px;
  font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  font-size: 13px;
  line-height: 1.6;
  color: var(--text-dim);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  text-align: right;
  user-select: none;
  min-width: 44px;
  white-space: pre;
  pointer-events: none;
}

textarea#source {
  flex: 1;
  background: var(--bg);
  color: var(--text);
  border: none;
  outline: none;
  resize: none;
  font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  font-size: 13px;
  line-height: 1.6;
  padding: 12px 14px;
  tab-size: 4;
  white-space: pre;
  overflow-wrap: normal;
  overflow-x: auto;
}

/* ── Output pane ─────────────────────────────────────────── */
.output-pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

/* Tabs */
.tabs {
  height: var(--tab-h);
  display: flex;
  align-items: stretch;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
}

.tab-btn {
  padding: 0 16px;
  font-size: 13px;
  color: var(--text-dim);
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: color 0.15s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
.tab-btn .badge {
  background: var(--red);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 9px;
  min-width: 16px;
  text-align: center;
}
.tab-btn .badge.green { background: var(--green); }

/* Tab panels */
.tab-panel {
  flex: 1;
  overflow: auto;
  display: none;
}
.tab-panel.active { display: block; }

pre.output {
  font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  font-size: 12.5px;
  line-height: 1.6;
  padding: 14px 16px;
  white-space: pre;
  color: var(--text);
  min-height: 100%;
}

/* TPTIR syntax colours (applied via JS spans) */
.ir-comment  { color: var(--text-dim); }
.ir-keyword  { color: var(--purple); }
.ir-label    { color: var(--orange); font-weight: 600; }
.ir-type     { color: var(--teal); }
.ir-ssa      { color: var(--accent); }
.ir-op       { color: var(--yellow); }
.ir-fn       { color: var(--green); font-weight: 600; }
.ir-attr     { color: var(--text-dim); }

/* Rust syntax colours */
.rs-keyword  { color: var(--purple); }
.rs-fn       { color: var(--green); font-weight: 600; }
.rs-type     { color: var(--teal); }
.rs-comment  { color: var(--text-dim); }
.rs-string   { color: var(--orange); }
.rs-macro    { color: var(--yellow); }
.rs-attr     { color: var(--text-dim); }

/* Perf tab */
.perf-panel {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  min-height: 100%;
}

.perf-summary {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
}

.perf-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
}
.perf-card .label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.perf-card .value { font-size: 22px; font-weight: 700; color: var(--accent); font-family: monospace; }
.perf-card .unit  { font-size: 12px; color: var(--text-dim); }

.perf-ops {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.perf-ops table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.perf-ops th {
  background: var(--bg3);
  padding: 8px 12px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
}
.perf-ops td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.perf-ops tr:last-child td { border-bottom: none; }
.perf-ops .op-name { color: var(--yellow); font-family: monospace; }
.perf-ops .op-count { color: var(--text-dim); }
.perf-ops .op-gflops { color: var(--accent); font-family: monospace; }

.perf-note {
  font-size: 11.5px;
  color: var(--text-dim);
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  line-height: 1.5;
}

.empty-state {
  color: var(--text-dim);
  font-size: 13px;
  padding: 32px 16px;
  text-align: center;
}

/* Errors tab */
.error-list { padding: 12px; display: flex; flex-direction: column; gap: 8px; }

.error-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--red);
  border-radius: 6px;
  padding: 10px 14px;
}
.error-card .err-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}
.error-card .err-code {
  font-size: 11px;
  font-family: monospace;
  background: rgba(248,81,73,0.15);
  color: var(--red);
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 700;
}
.error-card .err-loc {
  font-size: 11px;
  color: var(--text-dim);
  font-family: monospace;
}
.error-card .err-msg  { color: var(--text); font-size: 13px; }
.error-card .err-fix  {
  margin-top: 8px;
  font-size: 12px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 10px;
  font-family: monospace;
  color: var(--teal);
}
.error-card .err-fix::before {
  content: "fix: ";
  color: var(--text-dim);
  font-style: italic;
}
.error-card .err-suggestion {
  margin-top: 6px;
  font-size: 12px;
  color: var(--text-dim);
}

/* ── Status bar ───────────────────────────────────────────── */
.status-bar {
  height: var(--bar-h);
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 14px;
  font-size: 12px;
  color: var(--text-dim);
  gap: 16px;
  flex-shrink: 0;
}
.status-bar .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--text-dim);
  flex-shrink: 0;
}
.status-bar.ok   .dot { background: var(--green); }
.status-bar.err  .dot { background: var(--red); }
.status-bar.busy .dot { background: var(--yellow); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.status-bar .spacer { flex: 1; }
.status-bar .hint { color: var(--text-dim); font-size: 11px; }

/* Resize handle */
.resize-handle {
  width: 4px;
  cursor: col-resize;
  background: transparent;
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  z-index: 10;
}
.resize-handle:hover, .resize-handle.dragging { background: var(--accent); }
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────── -->
<header>
  <div class="logo">TPT Playground <span>v0.1 — sim mode</span></div>
  <div class="spacer"></div>
  <select id="example-picker">
    <option value="">Load example…</option>
    <option value="relu">ReLU kernel</option>
    <option value="matmul">Matrix multiply (GEMM)</option>
    <option value="attention">Scaled dot-product attention</option>
    <option value="mixed">Mixed host + GPU</option>
    <option value="conv">Conv2D kernel</option>
    <option value="errors">Error demo</option>
  </select>
  <button id="run-btn">▶ Run</button>
</header>

<!-- ── Main ────────────────────────────────────────────────── -->
<div class="layout">

  <!-- Editor -->
  <div class="editor-pane" id="editor-pane">
    <div class="pane-label">TPT Script source</div>
    <div class="editor-wrap">
      <div class="editor-inner">
        <div class="line-numbers" id="line-numbers">1</div>
        <textarea id="source" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
      </div>
    </div>
    <div class="resize-handle" id="resize-handle"></div>
  </div>

  <!-- Output -->
  <div class="output-pane" id="output-pane">
    <div class="tabs">
      <button class="tab-btn active" data-tab="tptir">TPTIR</button>
      <button class="tab-btn" data-tab="rust">Rust</button>
      <button class="tab-btn" data-tab="perf">Perf Estimate</button>
      <button class="tab-btn" data-tab="errors">
        Errors <span class="badge" id="error-badge">0</span>
      </button>
    </div>

    <!-- TPTIR -->
    <div class="tab-panel active" id="panel-tptir">
      <pre class="output" id="out-tptir"></pre>
    </div>

    <!-- Rust -->
    <div class="tab-panel" id="panel-rust">
      <pre class="output" id="out-rust"></pre>
    </div>

    <!-- Perf -->
    <div class="tab-panel" id="panel-perf">
      <div class="perf-panel" id="out-perf"></div>
    </div>

    <!-- Errors -->
    <div class="tab-panel" id="panel-errors">
      <div class="error-list" id="out-errors"></div>
    </div>
  </div>
</div>

<!-- ── Status bar ───────────────────────────────────────────── -->
<div class="status-bar" id="status-bar">
  <div class="dot"></div>
  <span id="status-text">Loading WASM…</span>
  <div class="spacer"></div>
  <span class="hint">Ctrl+Enter to compile · auto-compiles on edit</span>
</div>

<script type="module">
// ── Load WASM ──────────────────────────────────────────────────────────────
import init, { compile } from './pkg/tpt_playground.js';

let wasmReady = false;

(async () => {
  try {
    await init();
    wasmReady = true;
    setStatus('ok', 'Ready — edit source or load an example');
    runCompile();
  } catch (e) {
    setStatus('err', 'WASM load failed: ' + e.message);
    document.getElementById('out-tptir').textContent =
      '; WASM not loaded.\n; Run: wasm-pack build --target web\n; Then serve this directory with a local HTTP server.';
  }
})();

// ── Example programs ───────────────────────────────────────────────────────
const EXAMPLES = {
relu: `@doc("Apply ReLU activation element-wise")
@requires_gpu(true)
fn relu(x: Tensor[f32, m, n]) -> Tensor[f32, m, n] {
    let result = tpt.relu(x)
    return result
}`,

matmul: `@doc("Matrix multiply A × B → C")
@constraint("a.shape[1] == b.shape[0]", error="Inner dims must match")
@requires_gpu(true)
@requires_tensor_cores(true)
@min_vram_gb(4)
fn matmul(a: Tensor[f32, m, k], b: Tensor[f32, k, n]) -> Tensor[f32, m, n] {
    let result = tpt.zeros([m, n], dtype=f32)
    tpt.gemm(a, b, result)
    return result
}`,

attention: `@doc("Scaled dot-product attention (multi-head)")
@requires_gpu(true)
@requires_tensor_cores(true)
@min_vram_gb(8)
fn sdp_attention(
    q: Tensor[f32, b, h, s, d],
    k: Tensor[f32, b, h, s, d],
    v: Tensor[f32, b, h, s, d]
) -> Tensor[f32, b, h, s, d] {
    let out = tpt.attention(q, k, v)
    return out
}`,

mixed: `@doc("Host-side batch preparation")
fn prepare_batch(size: i32) -> Tensor[f32, 32, 768] {
    let data = tpt.randn([32, 768], dtype=f32)
    return data
}

@doc("GPU: layer norm + GELU activation")
@requires_gpu(true)
fn fused_norm_gelu(x: Tensor[f32, 32, 768]) -> Tensor[f32, 32, 768] {
    let normed = tpt.layer_norm(x)
    let out    = tpt.gelu(normed)
    return out
}

@doc("GPU: attention projection")
@requires_gpu(true)
@requires_tensor_cores(true)
fn project(q: Tensor[f32, b, h, s, d], k: Tensor[f32, b, h, s, d], v: Tensor[f32, b, h, s, d]) -> Tensor[f32, b, h, s, d] {
    return tpt.attention(q, k, v)
}`,

conv: `@doc("2-D convolution kernel")
@requires_gpu(true)
@min_vram_gb(4)
fn conv2d_relu(
    x:      Tensor[f32, n, cin, h, w],
    weight: Tensor[f32, cout, cin, kh, kw]
) -> Tensor[f32, n, cout, h, w] {
    let out = tpt.conv2d(x, weight)
    let act = tpt.relu(out)
    return act
}`,

errors: `@doc("Shape mismatch demo — inner dims differ")
@constraint("a.shape[1] == b.shape[0]", error="Inner dims must match")
@requires_gpu(true)
fn bad_matmul(a: Tensor[f32, 4, 8], b: Tensor[f32, 16, 4]) -> Tensor[f32, 4, 4] {
    let result = tpt.zeros([4, 4], dtype=f32)
    tpt.gemm(a, b, result)
    return result
}`,
};

// ── DOM refs ───────────────────────────────────────────────────────────────
const sourceEl   = document.getElementById('source');
const lineNums   = document.getElementById('line-numbers');
const statusBar  = document.getElementById('status-bar');
const statusText = document.getElementById('status-text');
const errorBadge = document.getElementById('error-badge');
const outTptir   = document.getElementById('out-tptir');
const outRust    = document.getElementById('out-rust');
const outPerf    = document.getElementById('out-perf');
const outErrors  = document.getElementById('out-errors');

// Load default example
sourceEl.value = EXAMPLES.matmul;
updateLineNumbers();

// ── Tab switching ──────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  });
});

// ── Example picker ─────────────────────────────────────────────────────────
document.getElementById('example-picker').addEventListener('change', e => {
  const key = e.target.value;
  if (key && EXAMPLES[key]) {
    sourceEl.value = EXAMPLES[key];
    updateLineNumbers();
    runCompile();
    e.target.value = '';
  }
});

// ── Run button / keyboard ──────────────────────────────────────────────────
document.getElementById('run-btn').addEventListener('click', runCompile);
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); runCompile(); }
});

// ── Auto-compile on input (debounced 600ms) ────────────────────────────────
let debounce;
sourceEl.addEventListener('input', () => {
  updateLineNumbers();
  clearTimeout(debounce);
  debounce = setTimeout(runCompile, 600);
});
sourceEl.addEventListener('scroll', syncScroll);
sourceEl.addEventListener('keydown', handleTabKey);

// ── Compile ────────────────────────────────────────────────────────────────
function runCompile() {
  if (!wasmReady) return;
  const src = sourceEl.value;
  if (!src.trim()) {
    clearOutputs();
    setStatus('ok', 'Ready');
    return;
  }
  setStatus('busy', 'Compiling…');
  // Yield to the browser so the spinner renders, then compile.
  requestAnimationFrame(() => {
    try {
      const result = JSON.parse(compile(src));
      renderResult(result);
    } catch (e) {
      setStatus('err', 'Internal error: ' + e.message);
    }
  });
}

function renderResult(r) {
  // TPTIR
  outTptir.innerHTML = highlightTptir(r.tptir_source || '; (empty)');

  // Rust
  outRust.innerHTML = highlightRust(r.rust_source || '// (empty)');

  // Perf
  renderPerf(r.perf_estimate);

  // Errors
  renderErrors(r.errors || []);

  // Status
  const errCount = (r.errors || []).length;
  const gpuKernels = (r.tptir_source || '').split('func @').length - 1;
  const hostFns    = (r.rust_source  || '').split('pub fn ').length - 1;

  if (errCount > 0) {
    setStatus('err', `${errCount} error${errCount > 1 ? 's' : ''} — ${gpuKernels} GPU kernel${gpuKernels !== 1 ? 's' : ''}, ${hostFns} host function${hostFns !== 1 ? 's' : ''}`);
  } else {
    setStatus('ok', `Compiled — ${gpuKernels} GPU kernel${gpuKernels !== 1 ? 's' : ''}, ${hostFns} host function${hostFns !== 1 ? 's' : ''}`);
  }
}

// ── Perf rendering ─────────────────────────────────────────────────────────
function renderPerf(p) {
  if (!p) { outPerf.innerHTML = '<div class="empty-state">No perf data.</div>'; return; }

  const timeFmt = p.sim_time_ms >= 1000
    ? (p.sim_time_ms / 1000).toFixed(2) + ' s'
    : p.sim_time_ms >= 1
      ? p.sim_time_ms.toFixed(2) + ' ms'
      : (p.sim_time_ms * 1000).toFixed(1) + ' µs';

  const gfFmt = p.total_gflops >= 1000
    ? (p.total_gflops / 1000).toFixed(2) + ' TFLOPS'
    : p.total_gflops.toFixed(3) + ' GFLOPS';

  const memFmt = p.memory_gb >= 1
    ? p.memory_gb.toFixed(2) + ' GB'
    : (p.memory_gb * 1024).toFixed(1) + ' MB';

  const rows = (p.ops || []).map(op => `
    <tr>
      <td class="op-name">${esc(op.op)}</td>
      <td class="op-count">${op.count}×</td>
      <td class="op-gflops">${(op.gflops_each * op.count).toFixed(3)}</td>
      <td>${esc(op.description)}</td>
    </tr>`).join('');

  const tableHtml = rows ? `
    <div class="perf-ops">
      <table>
        <thead><tr><th>Operation</th><th>Count</th><th>GFLOPs</th><th>Basis</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>` : '<div class="empty-state">No compute-heavy operations found in TPTIR.</div>';

  outPerf.innerHTML = `
    <div class="perf-summary">
      <div class="perf-card">
        <div class="label">Sim time</div>
        <div class="value">${timeFmt}</div>
        <div class="unit">TPT SimGPU</div>
      </div>
      <div class="perf-card">
        <div class="label">FLOPs</div>
        <div class="value">${gfFmt}</div>
        <div class="unit">f32 compute</div>
      </div>
      <div class="perf-card">
        <div class="label">Memory</div>
        <div class="value">${memFmt}</div>
        <div class="unit">data moved</div>
      </div>
    </div>
    ${tableHtml}
    <div class="perf-note">${esc(p.note)}</div>`;
}

// ── Error rendering ────────────────────────────────────────────────────────
function renderErrors(errors) {
  const count = errors.length;
  errorBadge.textContent = count;
  errorBadge.className = 'badge' + (count === 0 ? ' green' : '');

  if (count === 0) {
    outErrors.innerHTML = '<div class="empty-state">✓ No errors</div>';
    return;
  }

  outErrors.innerHTML = errors.map(e => {
    const loc = e.line ? `line ${e.line}, col ${e.col}` : '';
    const fix = e.fix_code ? `<div class="err-fix">${esc(e.fix_code)}</div>` : '';
    const sug = e.suggestion ? `<div class="err-suggestion">💡 ${esc(e.suggestion)}</div>` : '';
    return `
      <div class="error-card">
        <div class="err-header">
          <span class="err-code">${esc(e.code)}</span>
          ${loc ? `<span class="err-loc">${esc(loc)}</span>` : ''}
        </div>
        <div class="err-msg">${esc(e.message)}</div>
        ${fix}${sug}
      </div>`;
  }).join('');
}

// ── TPTIR syntax highlighting ──────────────────────────────────────────────
function highlightTptir(src) {
  // Tokenise line-by-line for simplicity.
  return src.split('\n').map(line => {
    const t = line.trimStart();
    if (t.startsWith(';')) return `<span class="ir-comment">${esc(line)}</span>`;
    // Label lines (^entry:)
    if (/^\^[\w.]+:/.test(t)) return `<span class="ir-label">${esc(line)}</span>`;

    // func keyword + name
    let out = esc(line);
    out = out.replace(/\b(func|module|return|if|else|for|while)\b/g, '<span class="ir-keyword">$1</span>');
    out = out.replace(/(@[\w.]+)/g, '<span class="ir-fn">$1</span>');
    out = out.replace(/(tpt\.\w+)/g, '<span class="ir-op">$1</span>');
    out = out.replace(/(memref&lt;[^&gt;]+&gt;|i\d+|f\d+|bf16|index)/g, '<span class="ir-type">$1</span>');
    out = out.replace(/(%[\w.]+)/g, '<span class="ir-ssa">$1</span>');
    return out;
  }).join('\n');
}

// ── Rust syntax highlighting ───────────────────────────────────────────────
const RS_KEYWORDS = /\b(fn|let|mut|pub|use|mod|struct|impl|trait|return|if|else|for|while|match|in|ref|move|async|await|unsafe|extern|type|where|self|Self|super|crate)\b/g;
const RS_TYPES    = /\b(i8|i16|i32|i64|u8|u16|u32|u64|f32|f64|bool|str|String|Vec|Option|Result|Box|Arc|Rc|usize|isize)\b/g;

function highlightRust(src) {
  return src.split('\n').map(line => {
    const t = line.trimStart();
    if (t.startsWith('//')) return `<span class="rs-comment">${esc(line)}</span>`;
    let out = esc(line);
    out = out.replace(/^(\s*)(#\[[^\]]+\])/g, '$1<span class="rs-attr">$2</span>');
    out = out.replace(RS_KEYWORDS, '<span class="rs-keyword">$1</span>');
    out = out.replace(RS_TYPES, '<span class="rs-type">$1</span>');
    out = out.replace(/\b(println!|format!|vec!|panic!|assert!|eprintln!)\b/g, '<span class="rs-macro">$1</span>');
    out = out.replace(/(pub fn |fn )(\w+)/g, '$1<span class="rs-fn">$2</span>');
    out = out.replace(/(&quot;[^&quot;]*&quot;)/g, '<span class="rs-string">$1</span>');
    return out;
  }).join('\n');
}

// ── Utilities ──────────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function setStatus(type, msg) {
  statusBar.className = 'status-bar ' + type;
  statusText.textContent = msg;
}

function clearOutputs() {
  outTptir.textContent = '';
  outRust.textContent  = '';
  outPerf.innerHTML    = '';
  outErrors.innerHTML  = '';
  errorBadge.textContent = '0';
  errorBadge.className = 'badge green';
}

function updateLineNumbers() {
  const lines = sourceEl.value.split('\n').length;
  lineNums.textContent = Array.from({length: lines}, (_, i) => i + 1).join('\n');
}

function syncScroll() {
  lineNums.scrollTop = sourceEl.scrollTop;
}

function handleTabKey(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = sourceEl.selectionStart;
    const end   = sourceEl.selectionEnd;
    sourceEl.value = sourceEl.value.substring(0, start) + '    ' + sourceEl.value.substring(end);
    sourceEl.selectionStart = sourceEl.selectionEnd = start + 4;
  }
}

// ── Panel resize (drag divider) ────────────────────────────────────────────
const handle    = document.getElementById('resize-handle');
const editorPan = document.getElementById('editor-pane');
let dragging    = false;
let startX, startW;

handle.addEventListener('mousedown', e => {
  dragging = true;
  startX   = e.clientX;
  startW   = editorPan.offsetWidth;
  handle.classList.add('dragging');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
});
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const delta = e.clientX - startX;
  const newW  = Math.max(200, Math.min(startW + delta, window.innerWidth - 200));
  editorPan.style.width = newW + 'px';
});
document.addEventListener('mouseup', () => {
  dragging = false;
  handle.classList.remove('dragging');
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
});
</script>
