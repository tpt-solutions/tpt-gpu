language = "C"
include_guard = "TPT_RUNTIME_CAPI_TPTR_CAPI_H"
tab_width = 4
style = "type"
autogen_warning = "/* Warning: This file is auto-generated by cbindgen. Do not edit directly. */"
no_includes = false
sys_includes = ["stdint.h", "stddef.h"]
after_includes = """
#ifdef __cplusplus
extern "C" {
#endif
"""

[export]
prefix = ""

[fn]
prefix = ""
postfix = ""

[parse]
parse_deps = false
