name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable]

    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ matrix.rust }}
        components: rustfmt, clippy
    
    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache cargo index
      uses: actions/cache@v3
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache cargo build
      uses: actions/cache@v3
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Check formatting
      run: cargo fmt --all -- --check
    
    - name: Run clippy
      run: cargo clippy --all-targets -- -D warnings
    
    - name: Build
      run: cargo build --verbose
    
    - name: Run tests
      run: cargo test --verbose

  build-release:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    
    - name: Build release
      run: cargo build --release --workspace
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: release-${{ matrix.os }}
        path: |
          target/release/tpt-gpu-script
          target/release/tpt-gpu-script.exe
          target/release/tpt-gpu-lsp
          target/release/tpt-gpu-lsp.exe
          target/release/tpt-gpu-fmt
          target/release/tpt-gpu-fmt.exe

  vendor-builds:
    name: Vendor backend builds (cuda / rocm)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    - name: Build with CUDA feature
      # Confirms the real CUDA backend compiles against vendor headers.
      # The default `cargo test` path remains hardware-less (simulated).
      run: cargo build -p tpt-gpu-runtime --features cuda
    - name: Build with ROCm feature
      run: cargo build -p tpt-gpu-runtime --features rocm
    - name: Test CUDA feature (skips gracefully when no GPU present)
      run: cargo test -p tpt-gpu-runtime --features cuda
    - name: Test ROCm feature (skips gracefully when no GPU present)
      run: cargo test -p tpt-gpu-runtime --features rocm
