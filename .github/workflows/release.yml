name: Release

on:
  release:
    types: [created]

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: tpt-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: tpt-windows-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: tpt-macos-x86_64
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    
    - name: Build release
      run: cargo build --release --workspace --target ${{ matrix.target }}
    
    - name: Package (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        cd target/${{ matrix.target }}/release
        tar czvf ../../../${{ matrix.asset_name }}.tar.gz tpt tptb-lsp tptb-format
        cd -
    
    - name: Package (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        cd target/${{ matrix.target }}/release
        7z a ../../../${{ matrix.asset_name }}.zip tpt.exe tptb-lsp.exe tptb-format.exe
        cd -
    
    - name: Upload release assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./${{ matrix.asset_name }}.${{ matrix.os == 'windows-latest' && 'zip' || 'tar.gz' }}
        asset_name: ${{ matrix.asset_name }}.${{ matrix.os == 'windows-latest' && 'zip' || 'tar.gz' }}
        asset_content_type: application/octet-stream

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: create-release
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    
    - name: Login to crates.io
      run: cargo login ${{ secrets.CRATES_IO_TOKEN }}
    
    - name: Publish tptb-core
      run: cd layer7_tptb/tptb-core && cargo publish --allow-dirty
    
    - name: Publish tptb-cli
      run: cd layer7_tptb/tptb-cli && cargo publish --allow-dirty
    
    - name: Publish tptb-lsp
      run: cd layer7_tptb/tptb-lsp && cargo publish --allow-dirty
    
    - name: Publish tptb-format
      run: cd layer7_tptb/tptb-format && cargo publish --allow-dirty